spring.application.name=team-task-manager
server.port=${PORT:8080}

# ===== Database Configuration =====
# Render PostgreSQL (automatically uses DATABASE_URL)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== JPA Configuration =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT Configuration =====
jwt.secret=${JWT_SECRET:ThisIsAVeryLongSecretKeyForJWTTokenGenerationInTaskManager2024App}
jwt.expiration=86400000

# ===== Static Resources =====
spring.web.resources.add-mappings=true
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
spring.mvc.throw-exception-if-no-handler-found=false

# ===== Health Management =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true

# ===== Logging =====
logging.level.org.springframework.boot.web.embedded.tomcat=INFO
logging.level.com.taskmanager=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n