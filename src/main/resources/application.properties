spring.application.name=team-task-manager

# ===== Railway PORT (Dynamic Port) =====
server.port=${PORT:8080}

# ===== MySQL Database Configuration =====
# Railway provides DATABASE_URL in format: mysql://user:pass@host:port/db
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/taskmanager?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:dhawal}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA Configuration =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT Configuration =====
jwt.secret=${JWT_SECRET:ThisIsAVeryLongSecretKeyForJWTTokenGenerationInTaskManager2024App}
jwt.expiration=86400000

# ===== Static Resources =====
spring.web.resources.add-mappings=true
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
spring.mvc.throw-exception-if-no-handler-found=false

# ===== Health Management (Railway Healthcheck) =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true

# ===== Logging =====
logging.level.org.springframework.boot.web.embedded.tomcat=INFO
logging.level.com.taskmanager=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n